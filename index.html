
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fact or Fart - 真情假意照妖鏡</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loading { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans">
    <div class="max-w-md mx-auto p-6">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-black text-gray-900 mb-2">💨 Fact or Fart</h1>
            <p class="text-blue-600 font-bold text-xl tracking-widest">真情假意 照妖鏡</p>
            <div class="mt-4 p-4 bg-white rounded-xl text-sm border-l-8 border-blue-500 shadow-sm text-left">
                <p class="font-bold">宗旨：本站不設評論。透過數據識別含水量。</p>
                <p class="text-gray-500 mt-1 italic italic">認同與否，請自行判斷。</p>
            </div>
        </header>

        <div id="main-card" class="bg-white rounded-3xl p-8 text-center shadow-xl border border-gray-100">
            <div id="upload-zone">
                <button onclick="document.getElementById('camera-input').click()" class="w-full py-12">
                    <div class="text-6xl mb-4">📸</div>
                    <div class="text-2xl font-bold text-blue-600">點擊拍照 / 識別標籤</div>
                    <p class="text-gray-400 mt-2">大媽專用：一拍即鑑定</p>
                </button>
            </div>

            <div id="preview-zone" class="hidden">
                <img id="preview-img" class="max-h-80 mx-auto rounded-2xl shadow-md cursor-zoom-in border-4 border-gray-100" onclick="toggleZoom()">
                <p class="text-xs text-gray-400 mt-2">點擊圖片可放大檢查</p>
                <div class="mt-8 flex flex-col gap-3">
                    <button id="start-btn" onclick="startAnalysis()" class="w-full py-4 bg-blue-600 text-white rounded-2xl text-xl font-black shadow-lg">🚀 開始鑑定</button>
                    <button onclick="resetUpload()" class="text-gray-500 font-bold text-sm">❌ 拍糊了？按此重拍</button>
                </div>
            </div>
        </div>

        <div id="result-zone" class="hidden mt-8 p-8 bg-white border-2 border-blue-100 rounded-3xl shadow-xl">
            <h2 class="text-xl font-black mb-6 text-gray-900 flex items-center">⚖️ 專家鑑定報告</h2>
            <div id="analysis-text" class="whitespace-pre-wrap leading-relaxed text-gray-700 text-lg border-t pt-4"></div>
        </div>

        <input type="file" id="camera-input" accept="image/*" capture="camera" class="hidden" onchange="handleFile(this)">
    </div>

    <div id="zoom-modal" class="hidden fixed inset-0 bg-black bg-opacity-95 z-50 flex flex-col items-center justify-center p-4" onclick="toggleZoom()">
        <img id="zoom-img" class="max-w-full max-h-[85vh] object-contain">
        <button class="mt-8 px-12 py-3 bg-white text-black font-black rounded-full">返回</button>
    </div>

    <footer class="mt-16 text-center text-gray-300 text-xs tracking-tighter pb-10">
        © LAOJI PROJECT | 求真務實 數據說話
    </footer>

    <script>
        let base64Image = "";
        // 這裏需要你在 Vercel 設定環境變數，或手動填入（測試用）
        const API_KEY = "AIzaSyBdRtLdrRxaksEjJbrVXYv9gsGKAPL28rA"; 

        function handleFile(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    base64Image = e.target.result;
                    document.getElementById('preview-img').src = base64Image;
                    document.getElementById('zoom-img').src = base64Image;
                    document.getElementById('upload-zone').classList.add('hidden');
                    document.getElementById('preview-zone').classList.remove('hidden');
                };
                reader.readAsDataURL(file);
            }
        }

        function resetUpload() {
            document.getElementById('upload-zone').classList.remove('hidden');
            document.getElementById('preview-zone').classList.add('hidden');
            document.getElementById('result-zone').classList.add('hidden');
        }

        function toggleZoom() {
            document.getElementById('zoom-modal').classList.toggle('hidden');
        }

        async function startAnalysis() {
            const btn = document.getElementById('start-btn');
            const resultZone = document.getElementById('result-zone');
            const analysisText = document.getElementById('analysis-text');
            
            btn.disabled = true;
            btn.innerText = "🔍 正在捉妖...";
            resultZone.classList.add('hidden');

            const prompt = "你是一位極其嚴肅、權威的食品安全鑑定專家。請分析這張圖：1.鑑定結果【🟢事實/🟡誤導/🔴屁話】2.一句話總結謊言 3.列出數據證據 4.購買建議。請用嚴格的繁體中文鑑定書格式。";
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com{API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: } }] }]
                    })
                });
                const data = await response.json();
                analysisText.innerText = data.candidates[0].content.parts[0].text;
                resultZone.classList.remove('hidden');
            } catch (err) {
                analysisText.innerText = "⚠️ 鑑定失敗，請檢查網路或 API 配置。";
                resultZone.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btn.innerText = "🚀 開始鑑定";
            }
        }
    </script>
</body>
</html>
