<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>照妖鏡</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; background: #121212; color: #fff; margin: 0; }
        h1 { margin-top: 20px; font-size: 32px; color: #ffeb3b; }
        #box { width: 95vw; max-width: 500px; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; border: 4px solid #444; position: relative; }
        video, #p { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
        button { margin-top: 20px; padding: 18px; border-radius: 12px; border: none; font-weight: bold; font-size: 20px; cursor: pointer; width: 100%; max-width: 400px; }
        #result { margin-top: 20px; width: 100%; max-width: 800px; color: #333; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; }
        td { border: 1px solid #ddd; padding: 12px; font-size: 14px; line-height: 1.5; }
    </style>
</head>
<body>
    <h1>照妖鏡 🔍</h1>
    <div id="box"><video id="v" autoplay playsinline muted></video><img id="p" style="display:none;"></div>
    <button id="s" style="background:#1a73e8; color:white;">📸 拍攝圖像</button>
    <button id="a" style="background:#34a853; color:white; display:none;">🚀 查察驗真假</button>
    <div id="loading" style="display:none; color:#ffeb3b; margin:15px 0; font-weight:bold;">⏳ 正在查察，請稍候...</div>
    <div id="result"></div>

    <script>
        let pureBase64 = null;
        const v = document.getElementById('v'), p = document.getElementById('p');
        const sBtn = document.getElementById('s'), aBtn = document.getElementById('a');

        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }).then(stream => { v.srcObject = stream; });

        sBtn.onclick = () => {
            const canvas = document.createElement('canvas');
            const maxWidth = 1024; // 稍微放寬一點點確保清晰度
            const scale = v.videoWidth > maxWidth ? maxWidth / v.videoWidth : 1;
            canvas.width = v.videoWidth * scale;
            canvas.height = v.videoHeight * scale;
            canvas.getContext('2d').drawImage(v, 0, 0, canvas.width, canvas.height);
            
            const dataUrl = canvas.toDataURL('image/jpeg', 0.6);
            const dataParts = dataUrl.split(',');
            // 核心修復：精確獲取第二部分的 Base64 字串
            pureBase64 = dataParts.length > 1 ? dataParts[1] : dataParts[0];
            
            v.style.display = 'none'; p.src = dataUrl; p.style.display = 'block';
            sBtn.style.display = 'none'; aBtn.style.display = 'block';
        };

        aBtn.onclick = async () => {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('result').innerHTML = '';
            try {
                // 核心修復：使用相對路徑確保穩定
                const res = await fetch('./api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: pureBase64 })
                });
                const data = await res.json();
                document.getElementById('result').innerHTML = data.result || data.error;
            } catch (e) {
                document.getElementById('result').innerHTML = "<div style='color:white; background:red; padding:10px;'>連線異常，請重試</div>";
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        };
    </script>
</body>
</html>
