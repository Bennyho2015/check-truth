
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fact or Fart - 照妖鏡</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-6 text-center font-sans">
    <h1 class="text-3xl font-black mb-1">💨 Fact or Fart</h1>
    <p class="text-blue-700 font-bold mb-8">真情假意 照妖鏡</p>

    <div class="bg-white rounded-3xl p-8 shadow-lg mb-6">
        <div id="u-zone">
            <button onclick="document.getElementById('f-in').click()" class="w-full py-10">
                <div class="text-7xl mb-4">📸</div>
                <div class="text-xl font-bold text-blue-600">點擊拍照 / 防騙避坑</div>
                <p class="text-gray-400 text-xs mt-2 font-medium">消費者專用：一拍即鑑定</p>
            </button>
        </div>
        
        <div id="loading-zone" style="display:none;">
            <div class="text-4xl mb-4 animate-bounce">🔍</div>
            <p class="text-blue-600 font-bold">鑑定專家正在查看，請稍候...</p>
        </div>
    </div>

    <div id="report" style="display:none;" class="p-6 bg-white border-2 border-blue-100 rounded-3xl text-left shadow-xl">
        <h2 class="font-black border-b pb-3 mb-4 text-slate-800 text-xl">⚖️ 專家鑑定報告</h2>
        <div id="txt" class="text-lg leading-relaxed text-gray-700"></div>
        <button onclick="location.reload()" class="mt-8 w-full py-3 bg-gray-100 rounded-2xl font-bold text-gray-500">❌ 關閉報告</button>
    </div>

    <!-- 關鍵：不加 capture 標籤，讓系統自己選，最穩 -->
    <input type="file" id="f-in" accept="image/*" class="hidden" onchange="run(this)">

    <script>
        const KEY = "AIzaSyBdRtLdrRxaksEjJbrVXYv9gsGKAPL28rA"; 

        async function run(input) {
            if (!input.files || !input.files[0]) return;
            
            const file = input.files[0];
            const reader = new FileReader();
            
            // 介面立刻轉換，不給手機思考（閃退）的機會
            document.getElementById('u-zone').style.display = 'none';
            document.getElementById('loading-zone').style.display = 'block';

            reader.onload = async (e) => {
                const b64 = e.target.result.split(',')[1]; // 精確抓取純數據
                const url = `https://generativelanguage.googleapis.com{KEY}`;
                
                try {
                    const res = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents:}]
                        })
                    });
                    const d = await res.json();
                    
                    if (d.candidates && d.candidates[0].content.parts[0].text) {
                        document.getElementById('loading-zone').style.display = 'none';
                        document.getElementById('report').style.display = 'block';
                        document.getElementById('txt').innerText = d.candidates[0].content.parts[0].text;
                    } else {
                        alert("鑑定失敗，請重拍標籤細節。");
                        location.reload();
                    }
                } catch (err) {
                    alert("連線出錯：" + err.message);
                    location.reload();
                }
            };
            reader.readAsDataURL(file);
        }
    </script>
</body>
</html>
