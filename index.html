


<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fact or Fart - 照妖鏡</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen font-sans p-6 text-center">
    <h1 class="text-4xl font-black mb-2">💨 Fact or Fart</h1>
    <p class="text-blue-700 font-bold mb-8">真情假意 照妖鏡</p>

    <div class="bg-white rounded-[2rem] p-8 shadow-xl border border-slate-100 mb-6">
        <label for="camera-input" class="cursor-pointer block w-full py-10" id="upload-btn">
            <div class="text-7xl mb-4">📸</div>
            <div class="text-2xl font-black text-blue-600">點擊拍照 / 防騙避坑</div>
            <p class="text-gray-400 mt-2 text-sm">消費者專用：一拍即鑑定</p>
        </label>
        
        <div id="preview-area" style="display:none;">
            <img id="p-img" class="max-h-60 mx-auto rounded-xl shadow-md mb-6" onclick="window.location.reload()">
            <button id="go-btn" onclick="go()" class="w-full py-5 bg-blue-600 text-white rounded-3xl text-2xl font-black">🚀 開始鑑定</button>
            <p class="text-gray-400 mt-4 text-xs">拍糊了？點圖片重拍</p>
        </div>
    </div>

    <div id="report" style="display:none;" class="p-6 bg-white border-2 border-blue-100 rounded-[2rem] text-left shadow-xl">
        <h2 class="font-black border-b pb-2 mb-4">⚖️ 專家鑑定報告</h2>
        <div id="txt" class="text-lg leading-relaxed"></div>
    </div>

    <input type="file" id="camera-input" accept="image/*" class="hidden" onchange="load(this)">

    <script>
        let b64 = "";
        const KEY = "AIzaSyBdRtLdrRxaksEjJbrVXYv9gsGKAPL28rA"; // <-- 填入密鑰

        function load(input) {
            if (!input.files[0]) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const cvs = document.createElement('canvas');
                    const scale = Math.min(800 / img.width, 1); // 強制壓縮到 800 像素，防安卓閃退
                    cvs.width = img.width * scale;
                    cvs.height = img.height * scale;
                    cvs.getContext('2d').drawImage(img, 0, 0, cvs.width, cvs.height);
                    const data = cvs.toDataURL('image/jpeg', 0.5); // 壓縮質量
                    b64 = data.split(',')[1]; // 獲取純數據
                    document.getElementById('p-img').src = data;
                    document.getElementById('upload-btn').style.display = 'none';
                    document.getElementById('preview-area').style.display = 'block';
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(input.files[0]);
        }

        async function go() {
            const btn = document.getElementById('go-btn');
            const txt = document.getElementById('txt');
            btn.disabled = true; btn.innerText = "🔍 正在捉妖...";
            document.getElementById('report').style.display = 'block';
            txt.innerText = "鑑定中...";

            try {
                const url = `https://generativelanguage.googleapis.com{KEY}`;
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [
                            { text: "分析圖中真假：1.鑑定【🟢事實/🟡誤導/🔴屁話】2.總結 3.數據證據 4.建議。用繁體中文報告。" },
                            { inline_data: { mime_type: "image/jpeg", data: b64 } }
                        ]}]
                    })
                });
                const d = await res.json();
                txt.innerText = d.candidates[0].content.parts[0].text;
            } catch (e) { txt.innerText = "⚠️ 失敗：" + e.message; }
            btn.disabled = false; btn.innerText = "🚀 重新鑑定";
        }
    </script>
</body>
</html>
