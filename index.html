

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fact or Fart - 照妖鏡</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen">
    <div class="max-w-md mx-auto p-6">
        <header class="text-center mb-8">
            <h1 class="text-4xl font-black text-slate-800 mb-2">💨 Fact or Fart</h1>
            <p class="text-blue-700 font-bold text-xl">真情假意 照妖鏡</p>
            <div class="mt-4 p-4 bg-white rounded-2xl text-sm border-l-8 border-blue-500 shadow-md">
                <p class="font-bold">宗旨：本站不設評論。透過數據識別真假。</p>
            </div>
        </header>

        <div class="bg-white rounded-[2.5rem] p-8 text-center shadow-2xl">
            <!-- 拍照區 -->
            <div id="upload-zone">
                <!-- 修正：iPhone 最推薦的標準觸發方式 -->
                <label for="camera-input" class="cursor-pointer block w-full py-10">
                    <div class="text-7xl mb-4">📸</div>
                    <div class="text-2xl font-black text-blue-600">點擊拍照 / 防騙避坑</div>
                    <p class="text-gray-400 mt-3 font-medium">消費者專用：一拍即鑑定</p>
                </label>
            </div>

            <!-- 預覽區 -->
            <div id="preview-zone" class="hidden">
                <img id="preview-img" class="max-h-80 mx-auto rounded-2xl shadow-md border-4 border-slate-50" onclick="document.getElementById('zoom-modal').classList.remove('hidden')">
                <div class="mt-8 flex flex-col gap-4">
                    <button id="start-btn" type="button" onclick="startAnalysis(event)" class="w-full py-5 bg-blue-600 text-white rounded-3xl text-2xl font-black shadow-lg">🚀 開始鑑定</button>
                    <button type="button" onclick="window.location.reload()" class="text-slate-400 font-bold text-sm">❌ 拍糊了？按此重拍</button>
                </div>
            </div>
        </div>

        <div id="result-zone" class="hidden mt-6 p-8 bg-white border-2 border-blue-100 rounded-[2.5rem] shadow-2xl">
            <h2 class="text-xl font-black mb-4 text-slate-800 border-b pb-4">⚖️ 專家鑑定報告</h2>
            <div id="analysis-text" class="whitespace-pre-wrap leading-relaxed text-slate-700 text-lg"></div>
        </div>

        <!-- 修正：移除 capture 標籤，讓 iPhone 自行彈出選擇菜單（拍照或選圖），最穩妥 -->
        <input type="file" id="camera-input" accept="image/*" class="hidden" onchange="handleFile(this)">
    </div>

    <!-- 放大視窗 -->
    <div id="zoom-modal" class="hidden fixed inset-0 bg-black/95 z-50 flex items-center justify-center p-4" onclick="this.classList.add('hidden')">
        <img id="zoom-img" class="max-w-full max-h-[85vh] object-contain">
    </div>

    <script>
        let pureBase64 = "";
        const API_KEY = "在此填入你的AIza密鑰"; 

        function handleFile(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        // 蘋果內存小，強制縮小到 800 像素防閃退
                        const maxW = 800;
                        const scale = Math.min(maxW / img.width, 1);
                        canvas.width = img.width * scale;
                        canvas.height = img.height * scale;
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        
                        const dataUrl = canvas.toDataURL('image/jpeg', 0.6);
                        pureBase64 = dataUrl.split(',')[1]; // 確保只取數據部分
                        
                        document.getElementById('preview-img').src = dataUrl;
                        document.getElementById('zoom-img').src = dataUrl;
                        document.getElementById('upload-zone').classList.add('hidden');
                        document.getElementById('preview-zone').classList.remove('hidden');
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function startAnalysis(ev) {
            if(ev) ev.preventDefault();
            const btn = document.getElementById('start-btn');
            const resultZone = document.getElementById('result-zone');
            const analysisText = document.getElementById('analysis-text');
            if(!pureBase64) return;

            btn.disabled = true;
            btn.innerText = "🔍 正在過濾...";
            resultZone.classList.remove('hidden');
            analysisText.innerText = "鑑定專家正在分析中...";

            try {
                const url = `https://generativelanguage.googleapis.com{API_KEY}`;
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: 
                        }]
                    })
                });

                const data = await response.json();
                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    analysisText.innerText = data.candidates[0].content.parts[0].text;
                } else {
                    analysisText.innerText = "⚠️ 鑑定報告產出失敗。";
                }
            } catch (err) {
                analysisText.innerText = "⚠️ 連線出錯：" + err.message;
            } finally {
                btn.disabled = false;
                btn.innerText = "🚀 重新鑑定";
            }
        }
    </script>
</body>
</html>
