<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>照妖鏡 - 內容真偽核查</title>
    <style>
        body { font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; background: #121212; color: #fff; margin: 0; height: 100vh; }
        h1 { margin-top: 30px; font-size: 36px; color: #ffeb3b; text-shadow: 0 0 10px rgba(255,235,59,0.5); }
        
        /* 16:9 專業橫向高清框 */
        #box { width: 95vw; max-width: 600px; aspect-ratio: 16/9; border: 4px solid #444; border-radius: 12px; overflow: hidden; position: relative; background: #000; box-shadow: 0 8px 30px rgba(0,0,0,0.5); }
        video, #preview { width: 100%; height: 100%; object-fit: cover; }
        
        .controls { margin-top: 30px; width: 95%; max-width: 500px; display: flex; flex-direction: column; gap: 15px; }
        button { padding: 18px; border: none; border-radius: 50px; font-weight: bold; font-size: 22px; cursor: pointer; transition: 0.3s; }
        
        .btn-shot { background: #1a73e8; color: white; }
        .btn-go { background: #34a853; color: white; display: none; border: 3px solid #ffeb3b; animation: pulse 2s infinite; }
        .btn-retry { background: #333; color: #bbb; font-size: 16px; display: none; }
        
        #hint { margin-top: 20px; color: #ffeb3b; font-weight: bold; text-align: center; font-size: 18px; display: none; line-height: 1.6; }
        
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <h1>照妖鏡 🔍</h1>
    <p style="color:#aaa; margin-bottom:15px;">拍下圖像和文字， AI 幚你查察真偽</p>

    <div id="box">
        <video id="video" autoplay playsinline muted></video>
        <img id="preview" style="display:none;">
    </div>

    <div class="controls">
        <button id="shot-btn" class="btn-shot">📸 拍攝高清圖像</button>
        <button id="go-btn" class="btn-go">🚀 查察驗真假</button>
        <button id="retry-btn" class="btn-retry">🔄 不清楚？重拍</button>
    </div>

    <div id="hint">
        ✨ 圖片及指令已自動複製！<br>
        跳轉後在對話框「貼上」即可。
    </div>

    <script>
        const video = document.getElementById('video');
        const preview = document.getElementById('preview');
        const shotBtn = document.getElementById('shot-btn');
        const goBtn = document.getElementById('go-btn');
        const retryBtn = document.getElementById('retry-btn');
        const hint = document.getElementById('hint');

        // 啟動相機
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: 1920 } })
            .then(stream => { video.srcObject = stream; });

        // 拍照動作
        shotBtn.onclick = async () => {
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            const dataUrl = canvas.toDataURL('image/png');
            preview.src = dataUrl;
            video.style.display = 'none';
            preview.style.display = 'block';
            
            shotBtn.style.display = 'none';
            goBtn.style.display = 'block';
            retryBtn.style.display = 'block';
            hint.style.display = 'block';

            // 自動準備：圖片 + 你的三欄表格指令
            const blob = await (await fetch(dataUrl)).blob();
            const command = "請幫我查察這張圖中的內容真偽。請直接用【三欄表格】回覆我：\n1.【原文片段】（嚴重錯誤配紅背景、誤導配黃背景、正確配綠背景）\n2.【簡要評議】\n3.【詳細理據】。完畢後我們可以繼續談話。";
            
            try {
                // 將文字指令和圖片一起寫入剪貼簿 (部分手機支援)
                const item = new ClipboardItem({ 
                    "image/png": blob,
                    "text/plain": new Blob([command], { type: "text/plain" })
                });
                await navigator.clipboard.write([item]);
            } catch (e) {
                console.log("Clipboard API failed");
            }
        };

        // 重拍
        retryBtn.onclick = () => {
            video.style.display = 'block';
            preview.style.display = 'none';
            shotBtn.style.display = 'block';
            goBtn.style.display = 'none';
            retryBtn.style.display = 'none';
            hint.style.display = 'none';
        };

        // 帶路人跳轉
        goBtn.onclick = () => {
            // 跳轉至 Gemini 官方 App 介面
            window.open("https://gemini.google.com", "_blank");
        };
    </script>
</body>
</html>
