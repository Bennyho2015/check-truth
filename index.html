<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>照妖鏡 - 內容真偽核查</title>
    <style>
        body { font-family: -apple-system, "PingFang HK", sans-serif; display: flex; flex-direction: column; align-items: center; padding: 15px; background: #121212; color: #fff; margin: 0; }
        h1 { margin-top: 20px; font-size: 32px; color: #ffeb3b; text-shadow: 0 0 10px rgba(255,235,59,0.5); }
        p { color: #aaa; font-size: 14px; margin-bottom: 10px; }
        
        /* 16:9 專業橫向高清畫框 */
        #container { 
            width: 95vw; 
            max-width: 600px; 
            aspect-ratio: 16 / 9; 
            border: 4px solid #444; 
            border-radius: 12px; 
            overflow: hidden; 
            position: relative; 
            background: #000; 
            box-shadow: 0 8px 30px rgba(0,0,0,0.5);
        }
        video, #preview { width: 100%; height: 100%; object-fit: cover; }
        
        .controls { margin-top: 20px; width: 95%; max-width: 500px; display: flex; flex-direction: column; gap: 12px; }
        button { padding: 16px; border: none; border-radius: 50px; font-weight: bold; font-size: 20px; cursor: pointer; transition: 0.3s; }
        
        .btn-shot { background: #1a73e8; color: white; }
        .btn-magic { background: #34a853; color: white; display: none; border: 2px solid #ffeb3b; }
        .btn-retry { background: #333; color: #bbb; font-size: 14px; display: none; }
        
        #loading { display: none; color: #ffeb3b; margin: 15px 0; font-weight: bold; text-align: center; font-size: 18px; }
        
        /* 表格結果顯示區 */
        #result-area { width: 100%; max-width: 900px; margin-top: 20px; color: #333; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; font-size: 14px; line-height: 1.6; }
        th { background: #f2f2f2; font-weight: bold; }
        .error-box { background: #f8d7da; color: #721c24; padding: 15px; border-radius: 8px; width: 100%; }
    </style>
</head>
<body>
    <h1>照妖鏡 🔍</h1>
    <p>對準文字，確認清晰後拍攝</p>

    <div id="container">
        <video id="video" autoplay playsinline muted></video>
        <img id="preview" style="display:none;">
    </div>

    <div class="controls">
        <button id="shot-btn" class="btn-shot">📸 拍攝高清圖像</button>
        <button id="magic-btn" class="btn-magic">🚀 查察驗真假</button>
        <button id="retry-btn" class="btn-retry">🔄 不清楚？重拍</button>
    </div>

    <div id="loading">⏳ 正在查察分析，請稍候...</div>
    <div id="result-area"></div>

    <script>
        const video = document.getElementById('video');
        const preview = document.getElementById('preview');
        const shotBtn = document.getElementById('shot-btn');
        const magicBtn = document.getElementById('magic-btn');
        const retryBtn = document.getElementById('retry-btn');
        const resultArea = document.getElementById('result-area');
        const loading = document.getElementById('loading');

        let pureBase64 = null;

        // 啟動高清相機
        async function initCamera() {
            try {
                const constraints = { 
                    video: { 
                        facingMode: "environment",
                        width: { ideal: 1920 },
                        height: { ideal: 1080 }
                    } 
                };
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
            } catch (err) {
                resultArea.innerHTML = '<div class="error-box">無法啟動高清相機，請檢查權限</div>';
            }
        }

        // 拍照動作
   shotBtn.onclick = () => {
    const canvas = document.createElement('canvas');
    
    // 核心修復：不管手機相機多高清，我們強制縮小到 1280 寬度來進行 AI 分析
    // 這對 AI 識字完全足夠，但體積會縮小 10 倍
    const maxWidth = 1280;
    const scale = video.videoWidth > maxWidth ? maxWidth / video.videoWidth : 1;
    
    canvas.width = video.videoWidth * scale;
    canvas.height = video.videoHeight * scale;
    
    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    
    // 關鍵修復：將質量(Quality)設為 0.5。JPEG 0.5 的體積非常適合雲端傳輸
    const dataUrl = canvas.toDataURL('image/jpeg', 0.5);
    
    // 確保只提取逗號後的數據
    const parts = dataUrl.split(',');
    pureBase64 = parts.length > 1 ? parts[1] : parts[0];
    
    video.style.display = 'none';
    preview.src = dataUrl;
    preview.style.display = 'block';
    shotBtn.style.display = 'none';
    magicBtn.style.display = 'block';
    retryBtn.style.display = 'block';
};




        // 重拍動作
        retryBtn.onclick = () => {
            video.style.display = 'block';
            preview.style.display = 'none';
            shotBtn.style.display = 'block';
            magicBtn.style.display = 'none';
            retryBtn.style.display = 'none';
            resultArea.innerHTML = '';
        };

        // 執行查察
        magicBtn.onclick = async () => {
            loading.style.display = 'block';
            resultArea.innerHTML = '';
            magicBtn.disabled = true;

            try {
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: pureBase64 })
                });
                const data = await response.json();
                if (data.error) throw new Error(data.error);
                resultArea.innerHTML = data.result;
            } catch (err) {
                resultArea.innerHTML = `<div class="error-box">查察失敗：${err.message}</div>`;
            } finally {
                loading.style.display = 'none';
                magicBtn.disabled = false;
            }
        };

        initCamera();
    </script>
</body>
</html>
