
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fact or Fart - 照妖鏡</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6 text-center font-sans">
    <h1 class="text-3xl font-black mb-1">💨 Fact or Fart</h1>
    <p class="text-blue-700 font-bold mb-6">真情假意 照妖鏡</p>

    <div class="bg-white rounded-3xl p-8 shadow-lg mb-6">
        <div id="u-zone">
            <button onclick="document.getElementById('f-in').click()" class="w-full">
                <div class="text-6xl mb-2">📸</div>
                <div class="text-xl font-bold text-blue-600">點擊拍照 / 防騙避坑</div>
                <p class="text-gray-400 text-xs mt-2">消費者專用：一拍即鑑定</p>
            </button>
        </div>
        
        <div id="p-zone" style="display:none;">
            <p id="status" class="text-blue-600 font-bold animate-pulse">🔍 鑑定專家正在分析中...</p>
        </div>
    </div>

    <div id="report" style="display:none;" class="p-5 bg-white border-2 border-blue-100 rounded-2xl text-left shadow-md">
        <h2 class="font-bold border-b pb-2 mb-3 text-slate-800">⚖️ 專家鑑定報告</h2>
        <div id="txt" class="text-base leading-relaxed text-gray-700"></div>
        <button onclick="location.reload()" class="mt-6 w-full py-2 bg-gray-200 rounded-xl text-sm font-bold text-gray-500">❌ 關閉報告</button>
    </div>

    <input type="file" id="f-in" accept="image/*" class="hidden" onchange="run(this)">

    <script>
        const KEY = "AIzaSyBdRtLdrRxaksEjJbrVXYv9gsGKAPL28rA"; 

        async function run(input) {
            if (!input.files[0]) return;
            
            const file = input.files[0];
            const reader = new FileReader();
            
            // 介面轉換
            document.getElementById('u-zone').style.display = 'none';
            document.getElementById('p-zone').style.display = 'block';

            reader.onload = async (e) => {
                const b64 = e.target.result.split(',')[1];
                const url = `https://generativelanguage.googleapis.com{KEY}`;
                
                try {
                    const res = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents:}]
                        })
                    });
                    const d = await res.json();
                    document.getElementById('p-zone').style.display = 'none';
                    document.getElementById('report').style.display = 'block';
                    document.getElementById('txt').innerText = d.candidates[0].content.parts[0].text;
                } catch (err) {
                    alert("鑑定失敗：" + err.message);
                    location.reload();
                }
            };
            reader.readAsDataURL(file);
        }
    </script>
</body>
</html>
