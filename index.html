
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fact or Fart - 照妖鏡</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6 text-center">
    <h1 class="text-3xl font-black mb-1">💨 Fact or Fart</h1>
    <p class="text-blue-700 font-bold mb-6">真情假意 照妖鏡</p>

    <div class="bg-white rounded-3xl p-6 shadow-lg mb-6">
        <div id="u-zone">
            <button onclick="document.getElementById('file-in').click()" class="w-full py-8">
                <div class="text-6xl mb-2">📸</div>
                <div class="text-xl font-bold text-blue-600">點擊拍照 / 防騙避坑</div>
                <p class="text-gray-400 text-xs mt-2">消費者專用：一拍即鑑定</p>
            </button>
        </div>
        
        <div id="p-zone" style="display:none;">
            <img id="p-img" class="max-h-48 mx-auto rounded-lg mb-4 shadow" onclick="location.reload()">
            <button id="go-btn" onclick="go()" class="w-full py-4 bg-blue-600 text-white rounded-2xl text-xl font-black">🚀 開始鑑定</button>
        </div>
    </div>

    <div id="report" style="display:none;" class="p-5 bg-white border-2 border-blue-100 rounded-2xl text-left shadow-md">
        <h2 class="font-bold border-b pb-2 mb-3">⚖️ 專家鑑定報告</h2>
        <div id="txt" class="text-base leading-relaxed text-gray-700"></div>
    </div>

    <input type="file" id="file-in" accept="image/*" class="hidden" onchange="load(this)">

    <script>
        let rawB64 = "";
        const KEY = "AIzaSyBdRtLdrRxaksEjJbrVXYv9gsGKAPL28rA"; // <--- 填入密鑰

        function load(input) {
            if (!input.files[0]) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const cvs = document.createElement('canvas');
                    const scale = Math.min(800 / img.width, 1); 
                    cvs.width = img.width * scale;
                    cvs.height = img.height * scale;
                    cvs.getContext('2d').drawImage(img, 0, 0, cvs.width, cvs.height);
                    const data = cvs.toDataURL('image/jpeg', 0.6);
                    rawB64 = data.split(',')[1]; // 精確獲取純數據
                    document.getElementById('p-img').src = data;
                    document.getElementById('u-zone').style.display = 'none';
                    document.getElementById('p-zone').style.display = 'block';
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(input.files[0]);
        }

        async function go() {
            const btn = document.getElementById('go-btn');
            const txt = document.getElementById('txt');
            btn.disabled = true; btn.innerText = "🔍 鑑定中...";
            document.getElementById('report').style.display = 'block';
            txt.innerText = "鑑定專家正在仔細查看，請稍候...";

            const url = `https://generativelanguage.googleapis.com{KEY}`;
            
            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents:}]
                    })
                });
                const d = await res.json();
                if (d.candidates) {
                    txt.innerText = d.candidates[0].content.parts[0].text;
                } else {
                    txt.innerText = "⚠️ 失敗：" + JSON.stringify(d);
                }
            } catch (e) { txt.innerText = "⚠️ 錯誤：" + e.message; }
            btn.disabled = false; btn.innerText = "🚀 再次鑑定";
        }
    </script>
</body>
</html>
