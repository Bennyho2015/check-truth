<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fact-or-Fart 🔍</title>
    <style>
        body { font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; background: #f0f2f5; color: #333; margin: 0; }
        h1 { margin-top: 20px; color: #1a73e8; }
        /* 预览窗口：保持 4:3 比例 */
        #container { width: 100%; max-width: 500px; aspect-ratio: 4/3; background: #000; border-radius: 16px; overflow: hidden; position: relative; box-shadow: 0 8px 24px rgba(0,0,0,0.15); }
        video, #photo-preview { width: 100%; height: 100%; object-fit: cover; }
        .controls { margin-top: 25px; display: flex; gap: 15px; width: 100%; max-width: 500px; }
        button { flex: 1; padding: 16px; border: none; border-radius: 12px; font-weight: bold; font-size: 16px; transition: 0.2s; cursor: pointer; }
        .btn-capture { background: #1a73e8; color: white; }
        .btn-confirm { background: #34a853; color: white; }
        .btn-retake { background: #dadce0; color: #3c4043; }
        button:active { transform: scale(0.95); opacity: 0.9; }
        #result-area { margin-top: 25px; width: 100%; max-width: 500px; }
        .loading { display: none; color: #1a73e8; font-weight: bold; margin-top: 15px; text-align: center; }
        /* 结果样式卡片 */
        .fact-box { padding: 16px; border-radius: 12px; margin-bottom: 12px; line-height: 1.6; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .fact-red { background: #fce8e6; border-left: 6px solid #d93025; color: #a50e0e; }
        .fact-yellow { background: #fef7e0; border-left: 6px solid #f9ab00; color: #a16207; }
        .fact-green { background: #e6f4ea; border-left: 6px solid #1e8e3e; color: #0d652d; }
    </style>
</head>
<body>

    <h1>Fact-or-Fart 🔍</h1>
    <p style="color: #666; font-size: 14px; margin-bottom: 15px;">拍摄文字，AI 帮您核查真伪</p>

    <div id="container">
        <!-- playsinline, muted, autoplay 是 iOS 兼容性的关键 -->
        <video id="video" autoplay playsinline muted></video>
        <img id="photo-preview" style="display:none;">
    </div>

    <canvas id="canvas" style="display:none;"></canvas>

    <div class="controls">
        <button id="capture-btn" class="btn-capture">📸 拍照</button>
        <button id="retake-btn" class="btn-retake" style="display:none;">🔄 重拍</button>
        <button id="confirm-btn" class="btn-confirm" style="display:none;">🚀 确定分析</button>
    </div>

    <div id="loading" class="loading">⏳ 正在通过云端请求 Gemini...</div>
    <div id="result-area"></div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const photoPreview = document.getElementById('photo-preview');
        const resultArea = document.getElementById('result-area');
        const loading = document.getElementById('loading');
        const captureBtn = document.getElementById('capture-btn');
        const retakeBtn = document.getElementById('retake-btn');
        const confirmBtn = document.getElementById('confirm-btn');

        let pureBase64 = null;

        // 启动摄像头
        async function initCamera() {
            try {
                const constraints = {
                    video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } }
                };
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                // 确保 iOS 自动播放
                video.onloadedmetadata = () => video.play();
            } catch (err) {
                resultArea.innerHTML = `<div style="color:red; text-align:center;">无法启动相机，请确保：<br>1. 使用 HTTPS 访问<br>2. 已授予相机权限</div>`;
            }
        }

        // 拍照
        captureBtn.onclick = () => {
            const scale = 0.7; // 缩放以减小体积
            canvas.width = video.videoWidth * scale;
            canvas.height = video.videoHeight * scale;
            canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // 导出高质量且适度压缩的 JPEG
            const dataUrl = canvas.toDataURL('image/jpeg', 0.6);
            // 核心点：只提取逗号后面的纯 Base64 数据，减轻后端负担
            pureBase64 = dataUrl.split(',')[1];
            
            video.style.display = 'none';
            photoPreview.src = dataUrl;
            photoPreview.style.display = 'block';
            
            captureBtn.style.display = 'none';
            retakeBtn.style.display = 'inline-block';
            confirmBtn.style.display = 'inline-block';
        };

        // 重拍
        retakeBtn.onclick = () => {
            video.style.display = 'block';
            photoPreview.style.display = 'none';
            captureBtn.style.display = 'inline-block';
            retakeBtn.style.display = 'none';
            confirmBtn.style.display = 'none';
            resultArea.innerHTML = '';
        };

        // 发送给后端的 /api/analyze
        confirmBtn.onclick = async () => {
            loading.style.display = 'block';
            resultArea.innerHTML = '';
            confirmBtn.disabled = true;

            try {
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: pureBase64 }) // 传给后端纯字符串
                });

                const data = await response.json();
                if (data.error) throw new Error(data.error);
                
                resultArea.innerHTML = data.result;
            } catch (error) {
                resultArea.innerHTML = `<div style="color:red; padding:10px;">分析失败：${error.message}</div>`;
            } finally {
                loading.style.display = 'none';
                confirmBtn.disabled = false;
            }
        };

        initCamera();
    </script>
</body>
</html>
