

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fact or Fart - 照妖鏡</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen font-sans">
    <div class="max-w-md mx-auto p-6">
        <header class="text-center mb-8">
            <h1 class="text-4xl font-black text-slate-800 mb-2">💨 Fact or Fart</h1>
            <p class="text-blue-700 font-bold text-xl tracking-widest">真情假意 照妖鏡</p>
            <div class="mt-4 p-4 bg-white rounded-2xl text-sm border-l-8 border-blue-500 shadow-md text-left">
                <p class="font-bold">宗旨：本站不設評論。以AI數據識別真假。</p>
            </div>
        </header>

        <div class="bg-white rounded-[2.5rem] p-8 text-center shadow-2xl border border-slate-100">
            <div id="upload-zone">
                <button type="button" onclick="document.getElementById('camera-input').click()" class="w-full py-10">
                    <div class="text-7xl mb-4">📸</div>
                    <div class="text-2xl font-black text-blue-600">點擊拍照 / 防騙避坑</div>
                    <p class="text-gray-400 mt-3 font-medium">消費者專用：一拍即鑑定</p>
                </button>
            </div>

            <div id="preview-zone" class="hidden">
                <img id="preview-img" class="max-h-80 mx-auto rounded-2xl shadow-md border-4 border-slate-50" onclick="document.getElementById('zoom-modal').classList.remove('hidden')">
                <p class="text-xs text-gray-400 mt-2">點擊圖片可放大檢查</p>
                <div class="mt-8 flex flex-col gap-4">
                    <button id="start-btn" type="button" onclick="startAnalysis(event)" class="w-full py-5 bg-blue-600 text-white rounded-3xl text-2xl font-black shadow-lg">🚀 開始鑑定</button>
                    <button type="button" onclick="location.reload()" class="text-slate-400 font-bold text-sm">❌ 不清楚？按此重拍</button>
                </div>
            </div>
        </div>

        <div id="result-zone" class="hidden mt-6 p-8 bg-white border-2 border-blue-100 rounded-[2.5rem] shadow-2xl">
            <h2 class="text-xl font-black mb-4 text-slate-800 border-b pb-4">⚖️ 專家鑑定報告</h2>
            <div id="analysis-text" class="whitespace-pre-wrap leading-relaxed text-slate-700 text-lg pt-4"></div>
        </div>

        <input type="file" id="camera-input" accept="image/*" capture="camera" class="hidden" onchange="handleFile(this)">
    </div>

    <div id="zoom-modal" class="hidden fixed inset-0 bg-black/95 z-50 flex items-center justify-center p-4" onclick="this.classList.add('hidden')">
        <img id="zoom-img" class="max-w-full max-h-[85vh] object-contain">
    </div>

    <script>
        let pureBase64 = "";
        const API_KEY = "在此填入你的AIza密鑰"; 

        function handleFile(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const scale = Math.min(1024 / img.width, 1024 / img.height, 1);
                        canvas.width = img.width * scale;
                        canvas.height = img.height * scale;
                        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                        const dataUrl = canvas.toDataURL('image/jpeg', 0.6);
                        
                        // 【關鍵修正點】：必須取陣列的第 [1] 位，才是真正的純 Base64
                        pureBase64 = dataUrl.split(',')[1];
                        
                        document.getElementById('preview-img').src = dataUrl;
                        document.getElementById('zoom-img').src = dataUrl;
                        document.getElementById('upload-zone').classList.add('hidden');
                        document.getElementById('preview-zone').classList.remove('hidden');
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            }
        }

        async function startAnalysis(ev) {
            if(ev) ev.preventDefault();
            const btn = document.getElementById('start-btn');
            const resultZone = document.getElementById('result-zone');
            const analysisText = document.getElementById('analysis-text');
            if(!pureBase64) return;

            btn.disabled = true;
            btn.innerText = "🔍 正在過濾...";
            resultZone.classList.remove('hidden');
            analysisText.innerText = "正在分析真假成分...";

            try {
                const url = `https://generativelanguage.googleapis.com{API_KEY}`;
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: 
                        }]
                    })
                });

                const data = await response.json();
                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    analysisText.innerText = data.candidates[0].content.parts[0].text;
                } else {
                    analysisText.innerText = "⚠️ 鑑定報告生成失敗，請嘗試拍得更清楚一點。";
                }
            } catch (err) {
                analysisText.innerText = "⚠️ 連線失敗：" + err.message;
            } finally {
                btn.disabled = false;
                btn.innerText = "🚀 重新鑑定";
            }
        }
    </script>
</body>
</html>
