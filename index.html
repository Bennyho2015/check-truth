<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>照妖鏡</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; background: #121212; color: #fff; margin: 0; }
        h1 { margin-top: 30px; font-size: 32px; color: #ffeb3b; }
        /* 改回 4:3 比例，這在手機上最穩定 */
        #box { width: 90vw; max-width: 500px; aspect-ratio: 4/3; background: #000; border-radius: 12px; overflow: hidden; border: 4px solid #444; }
        video, #p { width: 100%; height: 100%; object-fit: cover; }
        button { margin-top: 20px; padding: 18px; border-radius: 50px; border: none; font-weight: bold; font-size: 22px; cursor: pointer; width: 100%; max-width: 400px; }
        #result { margin-top: 20px; width: 100%; max-width: 800px; color: #333; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; }
        td, th { border: 1px solid #ddd; padding: 10px; font-size: 14px; }
    </style>
</head>
<body>
    <h1>照妖鏡 🔍</h1>
    <div id="box">
        <video id="v" autoplay playsinline muted></video>
        <img id="p" style="display:none;">
    </div>
    
    <button id="s" style="background:#1a73e8; color:white;">📸 拍照</button>
    <button id="a" style="background:#34a853; color:white; display:none;">🚀 查察驗真假</button>
    
    <div id="loading" style="display:none; color:#ffeb3b; margin-top:15px; font-weight:bold;">⏳ 正在查察，請稍候...</div>
    <div id="result"></div>

    <script>
        let imgData = null;
        const v = document.getElementById('v'), p = document.getElementById('p');
        const sBtn = document.getElementById('s'), aBtn = document.getElementById('a');

        // 最穩定的相機啟動代碼
        async function start() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" } 
                });
                v.srcObject = stream;
                v.onloadedmetadata = () => v.play();
            } catch (e) {
                alert("請允許相機權限！點擊網址旁的『鎖頭』圖標進行設置。");
            }
        }

        sBtn.onclick = () => {
            const c = document.createElement('canvas');
            c.width = v.videoWidth; c.height = v.videoHeight;
            c.getContext('2d').drawImage(v, 0, 0);
            
            // 壓縮圖片體積，確保傳輸成功
            const url = c.toDataURL('image/jpeg', 0.6);
            imgData = url.split(',')[1]; // 只拿 Base64 數據
            
            v.style.display = 'none'; 
            p.src = url; p.style.display = 'block';
            sBtn.style.display = 'none'; aBtn.style.display = 'block';
        };

        aBtn.onclick = async () => {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('result').innerHTML = '';
            aBtn.disabled = true;
            try {
                const res = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: imgData })
                });
                const data = await res.json();
                document.getElementById('result').innerHTML = data.result || data.error;
            } catch (e) {
                document.getElementById('result').innerHTML = "連線異常，請檢查網絡";
            } finally {
                document.getElementById('loading').style.display = 'none';
                aBtn.disabled = false;
            }
        };

        start();
    </script>
</body>
</html>
