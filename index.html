<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fact or Fart - 真情假意 照妖鏡</title>
    <style>
        :root { --red: #ff4d4d; --yellow: #ffcc00; --green: #2ecc71; --dark: #2c3e50; }
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; display: flex; justify-content: center; }
        .app-card { width: 100%; max-width: 500px; background: white; min-height: 100vh; box-shadow: 0 0 20px rgba(0,0,0,0.1); padding: 20px; display: flex; flex-direction: column; }
        .counter { text-align: center; font-size: 12px; color: #95a5a6; margin-bottom: 10px; font-weight: bold; }
        .logo { text-align: center; font-size: 28px; font-weight: bold; color: var(--dark); }
        .mission { font-size: 13px; background: #fdf9f0; border: 1px solid #eee; padding: 12px; border-radius: 8px; margin: 15px 0; line-height: 1.4; }
        textarea { width: 100%; height: 160px; border: 2px solid #eee; border-radius: 12px; padding: 15px; font-size: 16px; box-sizing: border-box; outline: none; resize: none; }
        .btn-main { width: 100%; padding: 16px; border-radius: 12px; border: none; font-size: 18px; font-weight: bold; cursor: pointer; background: var(--dark); color: white; margin-top: 15px; transition: 0.3s; }
        .btn-main:disabled { background: #95a5a6; cursor: not-allowed; }
        #result-area { margin-top: 20px; display: none; border-top: 2px dashed #eee; padding-top: 20px; }
        .report-tag { padding: 12px; border-radius: 8px; margin-bottom: 10px; font-size: 14px; line-height: 1.5; border-left: 6px solid; }
        .tag-red { background: #fff1f0; border-color: var(--red); color: #cf1322; }
        .tag-yellow { background: #fffbe6; border-color: var(--yellow); color: #856404; }
        .tag-green { background: #f6ffed; border-color: var(--green); color: #1b5e20; }
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 100; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 25px; border-radius: 15px; width: 85%; max-width: 400px; }
    </style>
</head>
<body>
    <div id="modal">
        <div class="modal-content">
            <h3>💡 這是什麼鏡？</h3>
            <p>這是一面「信息照妖鏡」。我們不站隊，只負責透過 AI 識別數據含水量。幫助街坊識別捏造、謬誤與情緒煽動。</p>
            <button onclick="closeModal()" style="width:100%; padding:14px; border-radius:12px; border:none; background:var(--dark); color:white; font-weight:bold; cursor:pointer;">知道了，開鏡！</button>
        </div>
    </div>

    <div class="app-card">
        <div class="counter">📊 今日已為街坊照妖 <span id="countNum">38</span> 次</div>
        <div class="logo">💨 Fact or Fart</div>
        <div style="text-align:center; font-weight:bold; color:var(--dark);">真情假意 照妖鏡</div>
        <div class="mission"><b>宗旨：</b>本站不設評論。透過 AI 識別數據含水量。紅/黃色代表煽動、謬誤或捏造。認同與否，請自行判斷。</div>
        
        <textarea id="userInput" placeholder="把文字貼在這裡..."></textarea>
        <button class="btn-main" id="filterBtn" onclick="runAI()">💨 開始過濾 (Filter)</button>

        <div id="result-area">
            <div id="tags"></div>
        </div>
        <div style="margin-top:auto; text-align:center; font-size:11px; color:#bdc3c7; padding:20px 0;">
            © LaoJi Project | 數據驅動 · 拒絕盲從
        </div>
    </div>

    <script>
        const API_KEY = "70ef83fa47ab48a7a9be47b64e8d0131.8gdNt6QMD8MPeoTe"; 

        function openModal() { document.getElementById('modal').style.display = 'flex'; }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        async function runAI() {
            const text = document.getElementById('userInput').value;
            if(!text) return alert("請先放入內容");
            
            const btn = document.getElementById('filterBtn');
            const tags = document.getElementById('tags');
            const resArea = document.getElementById('result-area');

            btn.disabled = true;
            btn.innerText = "正在照妖...";
            resArea.style.display = 'block';
            tags.innerHTML = '<div style="text-align:center; padding:20px;">🔍 正在掃描真相，請稍候...</div>';

            try {
                const response = await fetch("https://open.bigmodel.cn", {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + API_KEY 
                    },
                    body: JSON.stringify({
                        model: "glm-4-flash",
                        messages:
                    })
                });
                
                const data = await response.json();
                const resultText = data.choices[0].message.content;
                
                // 清理 AI 可能產生的 markdown 符號
                tags.innerHTML = resultText.replace(/```html/g, '').replace(/```/g, '');
                
                let num = parseInt(document.getElementById('countNum').innerText);
                document.getElementById('countNum').innerText = num + 1;
            } catch (error) {
                console.error(error);
                tags.innerHTML = '<div class="tag-red">連線失敗。請務必在 Vercel 網址打開，並檢查 API Key。</div>';
            } finally {
                btn.disabled = false;
                btn.innerText = "💨 開始過濾 (Filter)";
            }
        }
    </script>
</body>
</html>
