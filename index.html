<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>照妖鏡 - 防騙避坑</title>
    <style>
        body { font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; background: #121212; color: #fff; margin: 0; }
        h1 { margin-top: 20px; font-size: 32px; color: #ffeb3b; text-shadow: 0 0 10px rgba(255,235,59,0.5); }
        /* 圓形鏡面設計 */
        #container { width: 90vw; max-width: 450px; aspect-ratio: 1/1; border: 6px solid #444; border-radius: 50%; overflow: hidden; position: relative; background: #000; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        video, #preview { width: 100%; height: 100%; object-fit: cover; }
        .controls { margin-top: 25px; width: 90%; max-width: 400px; display: flex; flex-direction: column; gap: 15px; }
        button { padding: 18px; border: none; border-radius: 50px; font-weight: bold; font-size: 20px; cursor: pointer; transition: 0.3s; }
        .btn-shot { background: #1a73e8; color: white; }
        .btn-magic { background: #34a853; color: white; display: none; border: 2px solid #ffeb3b; }
        #loading { display: none; color: #ffeb3b; margin: 15px 0; font-weight: bold; text-align: center; }
        /* 表格結果區域 */
        #result-area { width: 100%; max-width: 800px; margin-top: 20px; color: #333; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; font-size: 14px; line-height: 1.5; }
        th { background: #f2f2f2; font-weight: bold; }
        .error-box { background: #f8d7da; color: #721c24; padding: 15px; border-radius: 8px; width: 100%; }
    </style>
</head>
<body>
    <h1>照妖鏡 🔍</h1>
    <p style="color:#aaa; font-size:14px; margin-bottom:15px;">對準文字拍照，真相立刻現形</p>

    <div id="container">
        <video id="video" autoplay playsinline muted></video>
        <img id="preview" style="display:none;">
    </div>

    <div class="controls">
        <button id="shot-btn" class="btn-shot">📸 拍照</button>
        <button id="magic-btn" class="btn-magic">✨ AI驗真假</button>
    </div>

    <div id="loading">⏳ 正在查察真偽，請稍候...</div>
    <div id="result-area"></div>

    <script>
        const video = document.getElementById('video');
        const preview = document.getElementById('preview');
        const shotBtn = document.getElementById('shot-btn');
        const magicBtn = document.getElementById('magic-btn');
        const resultArea = document.getElementById('result-area');
        const loading = document.getElementById('loading');

        let pureBase64 = null;

        // 啟動相機
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
            .then(stream => { video.srcObject = stream; })
            .catch(err => { resultArea.innerHTML = '<div class="error-box">請允許相機權限</div>'; });

        // 拍照
        shotBtn.onclick = () => {
            const canvas = document.createElement('canvas');
            const scale = 0.7; 
            canvas.width = video.videoWidth * scale;
            canvas.height = video.videoHeight * scale;
            canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
            
            const dataUrl = canvas.toDataURL('image/jpeg', 0.6);
            pureBase64 = dataUrl.split(',')[1]; // 只取 Base64 內容
            
            preview.src = dataUrl;
            video.style.display = 'none';
            preview.style.display = 'block';
            shotBtn.style.display = 'none';
            magicBtn.style.display = 'block';
        };

        // 點擊「查察」呼叫後端 API
        magicBtn.onclick = async () => {
            loading.style.display = 'block';
            resultArea.innerHTML = '';
            magicBtn.disabled = true;

            try {
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: pureBase64 })
                });
                const data = await response.json();
                if (data.error) throw new Error(data.error);
                
                // 這裡會直接顯示 AI 產生的 HTML 表格
                resultArea.innerHTML = data.result;
            } catch (err) {
                resultArea.innerHTML = `<div class="error-box">查察失敗：${err.message}</div>`;
            } finally {
                loading.style.display = 'none';
                magicBtn.disabled = false;
            }
        };
    </script>
</body>
</html>
