<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>照妖鏡</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; background: #121212; color: #fff; margin: 0; }
        h1 { margin-top: 20px; font-size: 32px; color: #ffeb3b; }
        #box { width: 95vw; max-width: 500px; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; border: 4px solid #444; position: relative; }
        video, #p { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
        button { margin-top: 20px; padding: 18px; border-radius: 12px; border: none; font-weight: bold; font-size: 20px; cursor: pointer; width: 100%; max-width: 400px; }
        #result { margin-top: 20px; width: 100%; max-width: 800px; color: #333; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; }
        td { border: 1px solid #ddd; padding: 12px; font-size: 14px; line-height: 1.5; }
    </style>
</head>
<body>
    <h1>照妖鏡 🔍</h1>
    <div id="box"><video id="v" autoplay playsinline muted></video><img id="p" style="display:none;"></div>
    <button id="s" style="background:#1a73e8; color:white;">📸 拍攝圖像</button>
    <button id="a" style="background:#34a853; color:white; display:none;">🚀 查察驗真假</button>
    <div id="loading" style="display:none; color:#ffeb3b; margin:15px 0; font-weight:bold;">⏳ 正在查察，請稍候...</div>
    <div id="result"></div>

<script>
    let finalBase64 = null; // 儲存處理後的圖片
    const v = document.getElementById('v'), p = document.getElementById('p'), sBtn = document.getElementById('s'), aBtn = document.getElementById('a'), resDiv = document.getElementById('result'), loading = document.getElementById('loading');

    // 啟動相機
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
        .then(stream => { v.srcObject = stream; })
        .catch(err => { alert("無法開啟相機：" + err); });

    // 拍照並壓縮
    sBtn.onclick = () => {
        const canvas = document.createElement('canvas');
        // 自動調整大小：限制寬度最大 1024px，高度等比例縮放
        const maxW = 1024;
        let w = v.videoWidth;
        let h = v.videoHeight;
        if (w > maxW) {
            h = Math.round((h * maxW) / w);
            w = maxW;
        }
        canvas.width = w;
        canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(v, 0, 0, w, h);
        
        // 壓縮質量設為 0.7 (兼顧清晰度與體積)
        const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
        finalBase64 = dataUrl.split(',')[1]; // 只取 Base64 內容，不含開頭的 data:image/jpeg;base64,
        
        v.style.display = 'none'; 
        p.src = dataUrl; 
        p.style.display = 'block';
        sBtn.style.display = 'none'; 
        aBtn.style.display = 'block';
    };

    // 發送請求
    aBtn.onclick = async () => {
        loading.style.display = 'block'; 
        resDiv.innerHTML = '';
        aBtn.disabled = true; // 防止重複點擊
        
        try {
            const response = await fetch('/api/analyze', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ image: finalBase64 })
            });

            const data = await response.json();
            if (response.ok) {
                resDiv.innerHTML = `<div style="background:white; color:#333; padding:15px; border-radius:8px; line-height:1.6;">${data.result}</div>`;
            } else {
                resDiv.innerHTML = `<div style="background:white; color:red; padding:10px;">出錯：${data.error || '未知錯誤'}</div>`;
            }
        } catch (e) {
            resDiv.innerHTML = `<div style="background:white; color:red; padding:10px;">連線異常：${e.message}</div>`;
        } finally { 
            loading.style.display = 'none'; 
            aBtn.disabled = false;
        }
    };
</script>
