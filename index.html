<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>照妖鏡</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; background: #121212; color: #fff; }
        #box { width: 95vw; max-width: 500px; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; }
        video, #preview { width: 100%; height: 100%; object-fit: cover; }
        button { margin-top: 20px; padding: 15px 30px; border-radius: 50px; border: none; font-weight: bold; font-size: 20px; cursor: pointer; width: 100%; max-width: 400px; }
        #result { margin-top: 20px; width: 100%; max-width: 600px; color: #333; }
        table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; }
        td { border: 1px solid #ddd; padding: 10px; font-size: 14px; }
    </style>
</head>
<body>
    <h1>照妖鏡 🔍</h1>
    <div id="box"><video id="v" autoplay playsinline muted></video><img id="p" style="display:none;"></div>
    <button id="s" style="background:#1a73e8; color:white;">📸 拍照</button>
    <button id="a" style="background:#34a853; color:white; display:none;">🚀 查察驗真假</button>
    <div id="loading" style="display:none; color:#ffeb3b; margin-top:15px;">⏳ 正在分析...</div>
    <div id="result"></div>
    <script>
        let img = null;
        navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}}).then(s=>{document.getElementById('v').srcObject=s;});
        document.getElementById('s').onclick=()=>{
            const c=document.createElement('canvas'); const v=document.getElementById('v');
            c.width=v.videoWidth; c.height=v.videoHeight; c.getContext('2d').drawImage(v,0,0);
            img=c.toDataURL('image/jpeg',0.5).split(',')[1];
            document.getElementById('v').style.display='none'; document.getElementById('p').src=c.toDataURL(); 
            document.getElementById('p').style.display='block'; document.getElementById('s').style.display='none';
            document.getElementById('a').style.display='block';
        };
        document.getElementById('a').onclick=async()=>{
            document.getElementById('loading').style.display='block';
            try {
                const res = await fetch('/api/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({image:img})});
                const data = await res.json(); document.getElementById('result').innerHTML = data.result || data.error;
            } catch(e) { document.getElementById('result').innerHTML = "連線失敗"; }
            document.getElementById('loading').style.display='none';
        };
    </script>
</body>
</html>
