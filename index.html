
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fact-or-Fart: AI 视觉核查</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; background: #f0f2f5; }
        #video, #canvas, #photo-preview { width: 100%; max-width: 500px; border-radius: 12px; background: #000; }
        .controls { margin-top: 20px; display: flex; gap: 10px; }
        button { padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-capture { background: #007bff; color: white; }
        .btn-retake { background: #6c757d; color: white; }
        .btn-confirm { background: #28a745; color: white; }
        .btn-chat { background: #6f42c1; color: white; margin-top: 15px; display: none; }
        #result-area { margin-top: 20px; width: 100%; max-width: 500px; line-height: 1.6; }
        .loading { display: none; color: #555; font-style: italic; }
        /* 颜色标签样式 */
        .fact-red { background: #ffcccc; border-left: 5px solid #ff4d4d; padding: 10px; margin-bottom: 5px; }
        .fact-yellow { background: #fff3cd; border-left: 5px solid #ffc107; padding: 10px; margin-bottom: 5px; }
        .fact-green { background: #d4edda; border-left: 5px solid #28a745; padding: 10px; margin-bottom: 5px; }
    </style>
</head>
<body>

    <h1>Fact-or-Fart 🔍</h1>
    
    <!-- 1. 拍照区域 -->
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas" style="display:none;"></canvas>
    <img id="photo-preview" style="display:none;">

    <!-- 2. 控制按钮 -->
    <div class="controls">
        <button id="capture-btn" class="btn-capture">拍照</button>
        <button id="retake-btn" class="btn-retake" style="display:none;">重拍</button>
        <button id="confirm-btn" class="btn-confirm" style="display:none;">确定并分析</button>
    </div>

    <div id="loading" class="loading">Gemini 正在分析中，请稍候...</div>

    <!-- 3 & 4. 结果显示区域 -->
    <div id="result-area"></div>

    <!-- 5. 深度对话按钮 -->
    <button id="chat-btn" class="btn-chat" onclick="goToChat()">与 AI 深度对话</button>

    <script>
        const API_KEY = 'AIzaSyBdRtLdrRxaksEjJbrVXYv9gsGKAPL28rA'; // ⚠️ 请替换你的 API Key
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const photoPreview = document.getElementById('photo-preview');
        const resultArea = document.getElementById('result-area');
        const loading = document.getElementById('loading');
        
        const captureBtn = document.getElementById('capture-btn');
        const retakeBtn = document.getElementById('retake-btn');
        const confirmBtn = document.getElementById('confirm-btn');
        const chatBtn = document.getElementById('chat-btn');

        let imageData = null;

        // 启动摄像头
        async function initCamera() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            video.srcObject = stream;
        }

        // 拍照
        captureBtn.onclick = () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            imageData = canvas.toDataURL('image/jpeg');
            
            video.style.display = 'none';
            photoPreview.src = imageData;
            photoPreview.style.display = 'block';
            
            captureBtn.style.display = 'none';
            retakeBtn.style.display = 'inline-block';
            confirmBtn.style.display = 'inline-block';
        };

        // 重拍
        retakeBtn.onclick = () => {
            video.style.display = 'block';
            photoPreview.style.display = 'none';
            retakeBtn.style.display = 'none';
            confirmBtn.style.display = 'none';
            captureBtn.style.display = 'inline-block';
            resultArea.innerHTML = '';
            chatBtn.style.display = 'none';
        };

        // 确定并连接 Gemini
        confirmBtn.onclick = async () => {
            loading.style.display = 'block';
            confirmBtn.disabled = true;

            const base64Content = imageData.split(',')[1];
            
            // 构造 Prompt
            const prompt = `分析图片中的文字内容。请识别出其中的虚假信息、夸张成分或煽情内容。
            回复格式要求为 HTML 段落：
            1. 严重伪造/错误内容用 <div class="fact-red">...</div>
            2. 夸张或有误导嫌疑内容用 <div class="fact-yellow">...</div>
            3. 事实准确内容用 <div class="fact-green">...</div>
            只需返回这些 div 内容，简洁明了。`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com{API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: prompt },
                                { inline_data: { mime_type: "image/jpeg", data: base64Content } }
                            ]
                        }]
                    })
                });

                const data = await response.json();
                const resultText = data.candidates[0].content.parts[0].text;
                resultArea.innerHTML = resultText;
                chatBtn.style.display = 'block';
            } catch (error) {
                resultArea.innerHTML = '分析失败，请检查网络或 API Key。';
            } finally {
                loading.style.display = 'none';
                confirmBtn.disabled = false;
            }
        };

        function goToChat() {
            // 跳转到 Google AI Studio 的聊天界面或你自定义的对话页
            window.open('https://aistudio.google.com', '_blank');
        }

        initCamera();
    </script>
</body>
</html>
